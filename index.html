<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Таня 🐍</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --dark-green: #1a3d2b;
    --mid-green: #2d6a4f;
    --light-green: #52b788;
    --white: #f8f8f0;
    --gold: #c9a84c;
    --black: #0a0a0a;
  }

  body {
    background: var(--dark-green);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
    font-family: 'Playfair Display', serif;
    position: relative;
  }

  /* ====== BACKGROUND PATTERN ====== */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(82,183,136,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 50%, rgba(82,183,136,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ====== DECORATIVE BORDER ====== */
  .border-frame {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    border: 3px solid rgba(201,168,76,0.4);
    margin: 12px;
    pointer-events: none;
    z-index: 100;
  }
  .border-frame::before {
    content: '';
    position: absolute;
    top: 8px; left: 8px; right: 8px; bottom: 8px;
    border: 1px solid rgba(201,168,76,0.2);
  }

  /* Corner ornaments */
  .corner {
    position: fixed;
    width: 60px; height: 60px;
    z-index: 101;
    pointer-events: none;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner-tl { top: 12px; left: 12px; }
  .corner-tr { top: 12px; right: 12px; transform: scaleX(-1); }
  .corner-bl { bottom: 12px; left: 12px; transform: scaleY(-1); }
  .corner-br { bottom: 12px; right: 12px; transform: scale(-1,-1); }

  /* ====== MAIN LAYOUT ====== */
  .page {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
    padding: 80px 20px;
  }

  /* ====== CHARACTERS ====== */
  .char-left, .char-right {
    position: fixed;
    bottom: 0;
    z-index: 10;
    transition: transform 0.3s ease;
  }
  .char-left { left: 20px; }
  .char-right { right: 20px; }
  .char-left:hover { transform: translateY(-10px); }
  .char-right:hover { transform: translateY(-10px); }

  /* ====== CENTER CARD ====== */
  .card {
    max-width: 680px;
    width: 100%;
    text-align: center;
    position: relative;
    z-index: 5;
  }

  .card-inner {
    background: rgba(10, 30, 20, 0.7);
    border: 1px solid rgba(201,168,76,0.35);
    border-radius: 4px;
    padding: 60px 50px;
    backdrop-filter: blur(8px);
    position: relative;
    box-shadow:
      0 0 60px rgba(0,0,0,0.6),
      inset 0 0 40px rgba(45,106,79,0.1);
  }

  .card-inner::before, .card-inner::after {
    content: '';
    position: absolute;
    left: 20px; right: 20px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.5), transparent);
  }
  .card-inner::before { top: 20px; }
  .card-inner::after { bottom: 20px; }

  /* ====== SNAKES TOP DECO ====== */
  .snake-divider { margin: 0 auto 30px; display: block; }

  /* ====== NAME ====== */
  .name-title {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(4rem, 10vw, 7rem);
    color: var(--white);
    line-height: 1;
    margin-bottom: 10px;
    text-shadow:
      0 0 30px rgba(82,183,136,0.5),
      0 0 60px rgba(82,183,136,0.2);
    animation: glow 3s ease-in-out infinite alternate;
  }

  @keyframes glow {
    from { text-shadow: 0 0 20px rgba(82,183,136,0.4), 0 0 40px rgba(82,183,136,0.1); }
    to   { text-shadow: 0 0 40px rgba(82,183,136,0.8), 0 0 80px rgba(82,183,136,0.3), 0 0 120px rgba(82,183,136,0.1); }
  }

  .subtitle {
    font-size: 0.8rem;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 40px;
    opacity: 0.8;
  }

  /* ====== DIVIDER ====== */
  .divider {
    display: flex;
    align-items: center;
    gap: 15px;
    margin: 30px 0;
    opacity: 0.6;
  }
  .divider-line { flex: 1; height: 1px; background: var(--gold); }
  .divider-icon { color: var(--gold); font-size: 1.2rem; }

  /* ====== MESSAGE ====== */
  .message {
    font-size: clamp(1.1rem, 2.5vw, 1.45rem);
    line-height: 1.8;
    color: var(--white);
    font-style: italic;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 1s ease 0.8s forwards;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .message .highlight {
    color: var(--light-green);
    font-style: normal;
    font-weight: 700;
  }

  /* ====== MUSIC PLAYER ====== */
  .music-box {
    margin-top: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .music-label {
    font-size: 0.75rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.7;
  }

  .music-btn {
    background: none;
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 10px 30px;
    font-family: 'Playfair Display', serif;
    font-size: 0.85rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .music-btn:hover {
    background: rgba(201,168,76,0.15);
    box-shadow: 0 0 20px rgba(201,168,76,0.2);
  }

  .vinyl {
    width: 50px; height: 50px;
    border-radius: 50%;
    background: radial-gradient(circle, #1a1a1a 25%, #333 25%, #333 30%, #1a1a1a 30%, #1a1a1a 40%, #333 40%, #333 45%, #1a1a1a 45%);
    border: 2px solid #555;
    animation: spin 3s linear infinite paused;
    position: relative;
  }
  .vinyl::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--gold);
  }
  .vinyl.playing { animation-play-state: running; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Music wave */
  .wave-bars {
    display: flex;
    gap: 3px;
    align-items: flex-end;
    height: 24px;
  }
  .wave-bar {
    width: 3px;
    background: var(--light-green);
    border-radius: 2px;
    animation: wave 0.8s ease-in-out infinite alternate paused;
  }
  .wave-bar.playing { animation-play-state: running; }
  .wave-bar:nth-child(1) { height: 60%; animation-delay: 0s; }
  .wave-bar:nth-child(2) { height: 100%; animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { height: 40%; animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { height: 80%; animation-delay: 0.05s; }
  .wave-bar:nth-child(5) { height: 60%; animation-delay: 0.15s; }
  @keyframes wave { to { height: 100%; } }

  /* ====== FLOATING PARTICLES ====== */
  .particle {
    position: fixed;
    pointer-events: none;
    animation: float linear infinite;
    z-index: 2;
    opacity: 0;
  }
  @keyframes float {
    0%   { opacity: 0; transform: translateY(100vh) rotate(0deg); }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(-100px) rotate(360deg); }
  }

  /* ====== ANIMALS DECO (bottom center) ====== */
  .animals-row {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 30px;
    opacity: 0.5;
  }

  /* ====== PINTEREST ROSES (top center deco) ====== */
  .roses-deco { margin: 0 auto 20px; display: flex; justify-content: center; }

  /* ====== RESPONSIVE ====== */
  @media (max-width: 900px) {
    .char-left, .char-right { display: none; }
  }
  @media (max-width: 600px) {
    .card-inner { padding: 40px 25px; }
  }

  /* ====== ENTRANCE ANIMATION ====== */
  .card { animation: cardIn 1.2s cubic-bezier(0.16,1,0.3,1) 0.2s both; }
  @keyframes cardIn {
    from { opacity: 0; transform: scale(0.9) translateY(30px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .char-left { animation: charInL 1.4s cubic-bezier(0.16,1,0.3,1) 0.5s both; }
  .char-right { animation: charInR 1.4s cubic-bezier(0.16,1,0.3,1) 0.5s both; }
  @keyframes charInL {
    from { opacity: 0; transform: translateX(-80px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes charInR {
    from { opacity: 0; transform: translateX(80px); }
    to   { opacity: 1; transform: translateX(0); }
  }
</style>
</head>

</audio>

<script>
  // ===== MUSIC =====
  let playing = false;
  const audio = document.getElementById('bgMusic');
  const vinyl = document.getElementById('vinyl');
  const waveBars = document.querySelectorAll('.wave-bar');
  const btnIcon = document.getElementById('btnIcon');
  const btnText = document.getElementById('btnText');

  function toggleMusic() {
    if (!playing) {
      audio.play().then(() => {
        playing = true;
        vinyl.classList.add('playing');
        waveBars.forEach(b => b.classList.add('playing'));
        btnIcon.textContent = '⏸';
        btnText.textContent = 'Пауза';
      }).catch(() => {
        btnText.textContent = 'Файл не найден 🎵';
      });
    } else {
      audio.pause();
      playing = false;
      vinyl.classList.remove('playing');
      waveBars.forEach(b => b.classList.remove('playing'));
      btnIcon.textContent = '▶';
      btnText.textContent = 'Включить музыку';
    }
  }

  // Auto-play attempt on load
  window.addEventListener('load', () => {
    setTimeout(() => {
      audio.play().then(() => {
        playing = true;
        vinyl.classList.add('playing');
        waveBars.forEach(b => b.classList.add('playing'));
        btnIcon.textContent = '⏸';
        btnText.textContent = 'Пауза';
      }).catch(() => {
        // Browser blocked autoplay, user needs to click
      });
    }, 1200);
  });

  // ===== FLOATING PARTICLES =====
  const symbols = ['🐍', '🌿', '✦', '◆', '🐾', '✿', '◇', '∿'];
  const container = document.getElementById('particles');

  function createParticle() {
    const el = document.createElement('div');
    el.className = 'particle';
    el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.fontSize = (Math.random() * 14 + 8) + 'px';
    el.style.animationDuration = (Math.random() * 12 + 8) + 's';
    el.style.animationDelay = (Math.random() * 5) + 's';
    el.style.opacity = '0';
    container.appendChild(el);
    setTimeout(() => el.remove(), 20000);
  }

  // Create particles periodically
  setInterval(createParticle, 1200);
  for (let i = 0; i < 6; i++) setTimeout(createParticle, i * 300);
</script>
